hydra:
  run:
    dir: ${cache_path}/${task}/${model.path}/${dataset}/${now:%Y-%m-%d}/${now:%H-%M-%S}

cache_path: ./workdir/output
save_path: '${hydra:run.dir}'

defaults:
  - model: bloomz-560m
  
task: ats

dataset: knkarthick/samsum
text_column: dialogue
label_column: summary
prompt: "Provide a summary for the following dialogue. The summary should (1) be rather short, (2) extract important pieces of information, (3) include names of interlocutors, (4) be written in the third person.\n\nHere's the dialogue:\n\n{text} (End of dialogue).\n\nSummary:\n"
# prompt: "Read the following dialogue and write a concise summary. The summary should (1) be rather short, (2) extract important pieces of information, (3) include names of interlocutors, (4) be written in the third person.\n\nDialogue:\n\n{text} (End of dialogue).\n\nSummary:\n"
train_split: train
eval_split: test
max_new_tokens: 128
load_from_disk: false
generation_params:
  stop_strings:
    - "\n"

instruct: true

train_dataset: null
train_test_split: false
test_split_size: 1

background_train_dataset: allenai/c4
background_train_dataset_text_column: text
background_train_dataset_label_column: url
background_train_dataset_data_files: en/c4-train.00000-of-01024.json.gz
background_load_from_disk: false

subsample_background_train_dataset: 1000
subsample_train_dataset: 1000
subsample_eval_dataset: -1

use_density_based_ue: true
use_seq_ue: true
use_tok_ue: false
use_ens_ue: false
generation_metrics: null
ens_type: 

# Examples of providing additional UE methods:
# additional_estimators: {
#   'lm_polygraph.estimators.perplexity': ['Perplexity'],
#   'lm_polygraph.estimators.eig_val_laplacian': ['EigValLaplacian']
# }
# additional_estimators_kwargs: {
#   'Perplexity': {},
#   'EigValLaplacian': {'similarity_score': 'NLI_score', 'affinity': 'entail'}
# }

ignore_exceptions: false

batch_size: 1
deberta_batch_size: 10

seed:
    - 1
