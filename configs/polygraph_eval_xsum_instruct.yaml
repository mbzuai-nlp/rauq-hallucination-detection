hydra:
  run:
    dir: ${cache_path}/${task}/${model.path}/${dataset}/${now:%Y-%m-%d}/${now:%H-%M-%S}

defaults:
  - model: bloomz-560m

cache_path: ./workdir/output
save_path: '${hydra:run.dir}'

device: cpu

task: ats

dataset: xsum
text_column: document
label_column: summary
# prompt: "Here's the text:\n\n{text} (End of text).\n\nProvide a summary for the following text. Give ONLY the summary, no other words or explanation.\n\nSummary (one sentence):\n"
# prompt: "Provide a short one-sentence summary for the following text.\n\nHere's the text:\n\n{text} (End of text).\n\nSummary:\n"
prompt: "Provide a short one-sentence summary of no more than 60 words for the following text.\n\nHere's the text:\n\n{text} (End of text).\n\nSummary:\n"
train_split: train
eval_split: test
max_new_tokens: 56
load_from_disk: false
generation_params:
  stop_strings:
    - "\n"

train_dataset: null
train_test_split: false
test_split_size: 1

background_train_dataset: allenai/c4
background_train_dataset_text_column: text
background_train_dataset_label_column: url
background_train_dataset_data_files: en/c4-train.00000-of-01024.json.gz
background_load_from_disk: false

subsample_background_train_dataset: 1000
subsample_train_dataset: 1000
subsample_eval_dataset: -1

use_density_based_ue: true
use_seq_ue: true
use_tok_ue: false
use_ens_ue: false

# Examples of providing additional UE methods:
# additional_estimators: {
#   'lm_polygraph.estimators.perplexity': ['Perplexity'],
#   'lm_polygraph.estimators.eig_val_laplacian': ['EigValLaplacian']
# }
# additional_estimators_kwargs: {
#   'Perplexity': {},
#   'EigValLaplacian': {'similarity_score': 'NLI_score', 'affinity': 'entail'}
# }

ignore_exceptions: false

batch_size: 1
deberta_batch_size: 1

instruct: true

seed:
    - 1
