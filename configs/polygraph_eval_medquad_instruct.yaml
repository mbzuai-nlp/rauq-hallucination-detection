hydra:
  run:
    dir: ${cache_path}/${task}/${model.path}/${dataset}/${now:%Y-%m-%d}/${now:%H-%M-%S}

cache_path: ./workdir/output
save_path: '${hydra:run.dir}'

defaults:
  - model: bloomz-560m
  
task: qa

dataset: keivalya/MedQuad-MedicalQnADataset
text_column: Question
label_column: Answer
# description: "Provide your best guess for the following question. Give ONLY the guess, no other words or explanation.\n\nFor example:"
# description: "Answer the following question as briefly as possible. Do not generate \\n in the answer.\n\nHere are a few examples of questions and answers:"
# description: "Answer the following question as briefly as possible. \n\nHere are a few examples of questions and answers:"
# prompt: "\n\nNow answer the following question.\n\nQuestion: {question}\nAnswer: {answer}"
# prompt: "Answer the question concisely.\n\nQuestion: {question}\nAnswer:"
description: "Answer the following question clearly and thoroughly. \n\nHere are a few examples of questions and answers:"
prompt: "\n\nNow answer the following question.\n\nQuestion: {question}\nAnswer: {answer}"
few_shot_prompt: "\n\nQuestion: {question}\nAnswer: {answer}"
train_split: train
few_shot_split: train
eval_split: train
max_new_tokens: 256
n_shot: 5
# n_shot: 0
load_from_disk: false
use_few_shot_data: false
normalize: true
# generation_params:
#   stop_strings:
#     - "\n"

instruct: true

train_dataset: null
train_test_split: true
test_split_size: 0.5

background_train_dataset: allenai/c4
background_train_dataset_text_column: text
background_train_dataset_label_column: url
background_train_dataset_data_files: en/c4-train.00000-of-01024.json.gz
background_load_from_disk: false

subsample_background_train_dataset: 1000
subsample_train_dataset: 1000
subsample_eval_dataset: -1
subsample_few_shot_dataset: 5

use_density_based_ue: true
use_seq_ue: true
use_tok_ue: false
use_ens_ue: false
generation_metrics: null
ens_type: 

# Examples of providing additional UE methods:
# additional_estimators: {
#   'lm_polygraph.estimators.perplexity': ['Perplexity'],
#   'lm_polygraph.estimators.eig_val_laplacian': ['EigValLaplacian']
# }
# additional_estimators_kwargs: {
#   'Perplexity': {},
#   'EigValLaplacian': {'similarity_score': 'NLI_score', 'affinity': 'entail'}
# }

ignore_exceptions: false

batch_size: 1
deberta_batch_size: 2

seed:
    - 1
    
